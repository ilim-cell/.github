name: Handle Semantic Search Issue

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  # JOB 1: Quick Response Team (Zero Heavy Dependencies)
  initialize:
    name: Initialize Search Status
    # Runs on initial open OR if labeled later (prevents double runs on issue creation)
    if: |
      (github.event.action == 'opened' && (contains(github.event.issue.labels.*.name, 'xkcd-search') || startsWith(github.event.issue.title, 'search:'))) ||
      (github.event.action == 'labeled' && github.event.label.name == 'xkcd-search' && github.event.issue.created_at != github.event.issue.updated_at)
    runs-on: ubuntu-latest
    outputs:
      comment_id: ${{ steps.init_comment.outputs.comment_id }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Status Comment
        id: init_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Post the starting comment and extract its comment ID immediately
          COMMENT_URL=$(gh issue comment ${{ github.event.issue.number }} --body "⏳ **Search has started...** The neural search engine is spinning up to process your query. Results will be posted here momentarily!")
          COMMENT_ID=$(echo "$COMMENT_URL" | grep -oE '[0-9]+$')
          echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT

  # JOB 2: Neural Network Engine (Cached & High Speed)
  compute-search:
    name: Neural Compute Engine
    needs: initialize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 1: Set up fast Rust-based package installer
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      # Step 2: Cache the entire Python virtual environment (PEP 668 Safe)
      - name: Cache Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('.github/workflows/issue-search.yml') }}

      # Step 3: Cache the Hugging Face AI model weights
      - name: Cache Hugging Face Model
        id: cache-hf
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-${{ runner.os }}-all-MiniLM-L6-v2
          restore-keys: |
            hf-model-${{ runner.os }}-

      # Step 4: Install dependencies ONLY if there was a cache miss
      - name: Install Compute Dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          uv venv
          uv pip install sentence-transformers numpy

      # Step 5: Execute vector mathematics
      - name: Execute Model Cross-Referencing & Auto-Rename
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          .venv/bin/python .github/scripts/issue_search.py

      # Step 6: Overwrite the starting status comment with final results
      - name: Edit Status Comment with Search Results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ needs.initialize.outputs.comment_id }}
        run: |
          gh api -X PATCH repos/${{ github.repository }}/issues/comments/${{ env.COMMENT_ID }} -F body=@search_results.md

      # Step 7: Lock issue to prevent spam
      - name: Lock Conversation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue lock ${{ github.event.issue.number }} --reason "resolved"
