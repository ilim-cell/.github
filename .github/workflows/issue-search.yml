name: Handle Semantic Search Issue

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  semantic-lookup:
    # Runs if the issue has the search label OR if the title starts with "search:"
    if: |
      contains(github.event.issue.labels.*.name, 'xkcd-search') || 
      startsWith(github.event.issue.title, 'search:')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Vault Repository
        uses: actions/checkout@v4

      - name: Create Initial Status Comment
        id: init_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Post the starting comment and extract its comment ID immediately
          COMMENT_URL=$(gh issue comment ${{ github.event.issue.number }} --body "⏳ **Search has started...** The neural search engine is spinning up to process your query. Results will be posted here momentarily!")
          COMMENT_ID=$(echo "$COMMENT_URL" | grep -oE '[0-9]+$')
          echo "COMMENT_ID=$COMMENT_ID" >> $GITHUB_ENV

      # Use 'uv' - the lightning fast Rust-based Python package installer
      - name: Set up uv
        uses: astral-sh/setup-uv-action@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      # Cache the Hugging Face neural network weights so they don't download every run
      - name: Cache Hugging Face Model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-${{ runner.os }}-all-MiniLM-L6-v2
          restore-keys: |
            hf-model-${{ runner.os }}-

      - name: Install Compute Dependencies
        # uv installs packages in seconds compared to standard pip
        run: |
          uv pip install --system sentence-transformers numpy

      - name: Execute Model Cross-Referencing & Auto-Rename
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/issue_search.py

      - name: Edit Status Comment with Search Results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PATCH repos/${{ github.repository }}/issues/comments/${{ env.COMMENT_ID }} -F body=@search_results.md

      - name: Lock Conversation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue lock ${{ github.event.issue.number }} --reason "resolved"