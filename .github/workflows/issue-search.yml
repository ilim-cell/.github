name: Handle Semantic Search Issue

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  # JOB 1: Quick Response Team (Post starting status instantly)
  initialize:
    name: Initialize Search Status
    if: |
      (github.event.action == 'opened' && (contains(github.event.issue.labels.*.name, 'xkcd-search') || startsWith(github.event.issue.title, 'search:'))) ||
      (github.event.action == 'labeled' && github.event.label.name == 'xkcd-search' && github.event.issue.created_at != github.event.issue.updated_at)
    runs-on: ubuntu-latest
    outputs:
      comment_id: ${{ steps.init_comment.outputs.comment_id }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Status Comment
        id: init_comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_URL=$(gh issue comment ${{ github.event.issue.number }} --body "⏳ **Search has started...** The high-speed Typesense search engine is processing your query. Results will be posted here momentarily!")
          COMMENT_ID=$(echo "$COMMENT_URL" | grep -oE '[0-9]+$')
          echo "comment_id=$COMMENT_ID" >> $GITHUB_OUTPUT

  # JOB 2: Typesense Search Engine (Powered by local Docker container service)
  compute-search:
    name: Typesense Search Engine
    needs: initialize
    runs-on: ubuntu-latest
    
    # Run Typesense container as a service container adjacent to the build job
    services:
      typesense:
        image: typesense/typesense:26.0
        ports:
          - 8108:8108
        env:
          TYPESENSE_API_KEY: xkcd-search-secret-key-123
          TYPESENSE_DATA_DIR: /tmp/typesense-data

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install the official Python client for Typesense
      - name: Install Search client dependencies
        run: |
          python -m pip install --upgrade pip
          pip install typesense

      # Run search script with connection credentials pointing to sidecar container
      - name: Execute Typesense Search & Auto-Rename
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TYPESENSE_API_KEY: xkcd-search-secret-key-123
          TYPESENSE_HOST: localhost
          TYPESENSE_PORT: 8108
        run: |
          python .github/scripts/issue_search.py

      - name: Edit Status Comment with Search Results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_ID: ${{ needs.initialize.outputs.comment_id }}
        run: |
          gh api -X PATCH repos/${{ github.repository }}/issues/comments/${{ env.COMMENT_ID }} -F body=@search_results.md

      - name: Lock Conversation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue lock ${{ github.event.issue.number }} --reason "resolved"
