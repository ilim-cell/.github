name: Fetch Latest xkcd

on:
  schedule:
    # Runs at 12:02 PM UTC on Monday, Wednesday, and Friday
    - cron: '2 12 * * 1,3,5'
  workflow_dispatch: # Allows manual trigger for testing

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch XKCD and Update Files
        run: python .github/scripts/update_xkcd.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage both the README and the freshly downloaded image
          git add README.md img/xkcd.png
          
          # Only commit if something actually changed
          git diff-index --quiet HEAD || git commit -m "chore: auto-update latest xkcd comic and image"
          git push
