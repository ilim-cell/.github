name: Fetch Latest xkcd

on:
  schedule:
    - cron: '2 12 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tesseract Binary
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip' # Speeds up consecutive downloads for sentence transformers

      - name: Install Python Dependencies
        run: pip install -r requirements.txt
      
      - name: Fetch XKCD, OCR, and Update Embedding Matrix
        run: python .github/scripts/update_xkcd.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add profile/README.md img/xkcd.png xkcd/ xkcd_embeddings.json
          
          git diff-index --quiet HEAD || git commit -m "archive: compile semantic vectors for newest entry"
          git push
